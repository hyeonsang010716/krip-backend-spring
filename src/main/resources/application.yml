server:
  port: ${PORT:8000}
  # 종료 시 진행 중 요청을 드레인 — readiness 가 먼저 OUT_OF_SERVICE 로 뒤집혀 LB 가 트래픽을 끊은 뒤 종료.
  shutdown: graceful

# ──────────────────── Actuator (헬스/레디니스 프로브) ────────────────────
# 프로브 경로: liveness=/actuator/health/liveness, readiness=/actuator/health/readiness
management:
  endpoints:
    web:
      exposure:
        include: health        # health 만 노출 — env/beans 등 민감 엔드포인트 비공개
  endpoint:
    health:
      probes:
        enabled: true          # liveness/readiness 그룹 활성화(k8s 외 환경에서도)
      show-details: never      # 공개 경로라 컴포넌트 내역(DB URL 등) 비노출
      group:
        # liveness 는 의존성 미포함(livenessState) — DB 깜빡임에 전체 파드 재시작 폭주 방지.
        # readiness 는 무중단 배포 게이팅 + 파드-로컬 DB/Redis 장애 감지. Mongo(부가 기능)는 제외.
        readiness:
          include: readinessState, db, redis

spring:
  application:
    name: krip-backend

  lifecycle:
    timeout-per-shutdown-phase: 20s   # graceful drain 최대 대기

  jackson:
    property-naming-strategy: SNAKE_CASE

  # ──────────────────── PostgreSQL (JPA) ────────────────────
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_NAME:krip}
    username: ${POSTGRES_USER:krip}
    password: ${POSTGRES_PASSWORD}
    hikari:
      maximum-pool-size: 20
      pool-name: krip-hikari
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false
    show-sql: false

  # ──────────────────── Flyway (스키마 마이그레이션) ────────────────────
  # ddl-auto=validate 와 한 쌍: 테이블 생성/변경은 Flyway, 검증만 Hibernate 가 담당.
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    baseline-version: 1

  # ──────────────────── MongoDB ────────────────────
  data:
    mongodb:
      uri: mongodb://${MONGODB_USER:krip}:${MONGODB_PASSWORD}@${MONGODB_HOST:localhost}:${MONGODB_PORT:27017}/${MONGODB_NAME:krip}?authSource=admin
      auto-index-creation: true

  # ──────────────────── Redis ────────────────────
  data.redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    database: ${REDIS_DB:0}
    timeout: 5s

# ──────────────────── 애플리케이션 설정 (krip.*) ────────────────────
krip:
  environment: ${ENVIRONMENT:DEV}
  # 스케줄러 스레드 풀: 전역 @Scheduled 와 채팅 WS 하트비트를 분리해 상호 밀림 방지.
  scheduling:
    pool-size: ${SCHEDULING_POOL_SIZE:4}
    chat-ws-pool-size: ${CHAT_WS_POOL_SIZE:4}
  # 비동기 executor: 채팅 FCM 푸시(블로킹 I/O)를 공용 ForkJoinPool 과 격리.
  executor:
    push-pool-size: ${PUSH_EXECUTOR_POOL_SIZE:4}
    push-queue-capacity: ${PUSH_EXECUTOR_QUEUE_CAPACITY:500}
    recover-pool-size: ${RECOVER_EXECUTOR_POOL_SIZE:4}
    recover-queue-capacity: ${RECOVER_EXECUTOR_QUEUE_CAPACITY:500}
    # 이미지 처리(decode/resize+S3): 동시 처리 한도 + 유계 큐, 포화 시 429(Tomcat 풀 고갈·메모리 폭증 차단).
    image-process-pool-size: ${IMAGE_PROCESS_POOL_SIZE:4}
    image-process-queue-capacity: ${IMAGE_PROCESS_QUEUE_CAPACITY:16}
    image-upload-pool-size: ${IMAGE_UPLOAD_POOL_SIZE:12}
    image-upload-queue-capacity: ${IMAGE_UPLOAD_QUEUE_CAPACITY:24}
    # 채팅 WS op(send/read): 컨테이너 I/O 스레드와 격리. 세션 단위 직렬(순서 보장), 포화 시 server_busy 백프레셔.
    chat-op-pool-size: ${CHAT_OP_POOL_SIZE:16}
    chat-op-queue-capacity: ${CHAT_OP_QUEUE_CAPACITY:1000}
    chat-op-session-max-queued: ${CHAT_OP_SESSION_MAX_QUEUED:64}
  auth:
    access-token: ${ACCESS_TOKEN:dev-access-token}
    jwt:
      # 필수(기본값 없음) — 미설정 시 부팅 실패. 로컬/운영 모두 환경변수로 주입(≥32자).
      secret: ${USER_LOGIN_JWT_SECRET_KEY}
      expiration-days: ${USER_LOGIN_JWT_EXPIRATION_DAYS:1}
      cookie-name: ${USER_LOGIN_COOKIE_NAME:utk}
    registered-cache-ttl-seconds: 86400
  share:
    # 필수(기본값 없음) — 미설정 시 부팅 실패. 로컬/운영 모두 환경변수로 주입(≥32자).
    secret: ${SHARE_JWT_SECRET_KEY}
    expiration-days: ${SHARE_JWT_EXPIRATION_DAYS:30}
  chat:
    # 채팅 fan-out 모드: in_process(단일 노드) | redis_stream(다중 노드 Redis Stream)
    fanout-mode: ${FANOUT_MODE:in_process}
    # 다중 노드 시 NODE_ID 는 재시작에도 안정적이어야 함(consumer group 커서 이어받기) — StatefulSet pod 명 등
    node-id: ${NODE_ID:${HOSTNAME:node-local}}
    dedupe-redis-database: ${CHAT_DEDUPE_REDIS_DB:1}
  fcm:
    # Firebase 서비스 계정 JSON 경로. 미설정/파일 부재 시 FCM 발송 비활성(토큰/뮤트/인박스는 정상).
    enabled: ${FCM_ENABLED:true}
    credentials-path: ${FCM_CREDENTIALS_PATH:}
    # 전송 타임아웃(ms) — FCM 행 시 push 워커 스레드 무한 점유 방지.
    connect-timeout-ms: ${FCM_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${FCM_READ_TIMEOUT_MS:5000}
    # 서킷 브레이커 — 전송 연속 실패 N회 시 cooldown(ms) 동안 발송 단락(fast-fail).
    circuit-failure-threshold: ${FCM_CIRCUIT_FAILURE_THRESHOLD:5}
    circuit-open-ms: ${FCM_CIRCUIT_OPEN_MS:30000}
  oauth:
    redirect-base-url: ${OAUTH_REDIRECT_BASE_URL:http://localhost:8000}
    frontend-url: ${FRONTEND_URL:https://krip.site}
    local-frontend-url: ${LOCAL_FRONTEND_URL:https://localhost:3000}
    app-deep-link: krip://auth/callback
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
  cors:
    allowed-origins:
      - ${FRONTEND_URL:https://krip.site}
      - ${LOCAL_FRONTEND_URL:https://localhost:3000}
    # 네이티브 앱(Capacitor) WebSocket 핸드셰이크 전용 origin. HTTP CORS 에는 미포함.
    app-allowed-origins:
      - capacitor://localhost
      - https://localhost
  storage:
    access-key-id: ${S3_ACCESS_KEY_ID:}
    secret-access-key: ${S3_SECRET_ACCESS_KEY:}
    region: ${S3_REGION:kr-standard}
    bucket-name: ${S3_BUCKET_NAME:}
    endpoint-url: ${S3_ENDPOINT_URL:}
  withdraw:
    grace-period-days: 30
    # cron 모드: 매일 KST 04:00. 테스트는 WITHDRAW_PURGE_CRON 으로 override.
    purge-cron: ${WITHDRAW_PURGE_CRON:0 0 4 * * *}
    purge-zone: Asia/Seoul

# multipart 업로드 한도
spring.servlet.multipart:
  max-file-size: 11MB
  max-request-size: 110MB

springdoc:
  swagger-ui:
    path: /docs
  api-docs:
    path: /openapi.json

logging:
  level:
    site.krip: ${LOG_LEVEL:INFO}
  # 레벨 뒤에 추적 ID 노출 — 콘솔/파일 기본 패턴이 ${LOG_LEVEL_PATTERN} 을 포함하므로 모든 appender 에 적용된다.
  # 요청 스레드는 RequestIdFilter, 비동기/스케줄 작업은 MdcTaskDecorator 가 request_id 를 채운다.
  pattern:
    level: "%5p [%X{request_id:-}]"
