services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongodb:
    image: mongo:7
    container_name: mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      # ping 은 인증 전에도 허용되는 명령 — 자격증명 없이 가용성만 확인.
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    container_name: redis
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # AI 전용 서버
  krip-ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: krip-ai
    restart: unless-stopped
    env_file:
      - ./ai/.env
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  krip-backend:
    build: .
    restart: unless-stopped       # OOM/크래시 시 자가복구 (Dockerfile 의 ExitOnOutOfMemoryError 와 짝)
    mem_limit: 2g                  # 힙은 이 한도의 70% — 동거 중인 DB 컨테이너로의 호스트 OOM 전파 차단
    stop_grace_period: 30s         # graceful drain(20s) 보다 길게 — Docker 기본 10s SIGKILL 로 드레인이 잘리는 것 방지
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      krip-ai:
        condition: service_started
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      # FCM 서비스 계정 JSON 등 시크릿을 read-only 로 주입.
      - ./secrets:/backend/secrets:ro
    healthcheck:
      # 의존성 없는 liveness 프로브 — 앱 프로세스/HTTP 응답성만 확인. start_period 로 부팅 시간 보호.
      test: ["CMD-SHELL", "curl -fsS http://localhost:${PORT:-8000}/actuator/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  pgdata:
  mongodata:
